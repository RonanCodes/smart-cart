name: Deploy
# CD only. No remote CI: the pre-push hook runs the full quality gate locally
# (format + lint + typecheck + build + test), so running it again on GitHub would
# just burn Actions minutes. This workflow only DEPLOYS on merge to main.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.ralph/**'
      - '.nightshift/**'
      - '.completion-reports/**'
concurrency:
  group: deploy-production
  cancel-in-progress: false
jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Apply only new D1 migrations (wrangler tracks applied ones in the
      # d1_migrations table). Never a per-file execute loop (CF rate limits).
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply smart_cart_db --remote
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
