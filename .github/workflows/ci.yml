name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.ralph/**'
      - '.nightshift/**'
      - '.completion-reports/**'
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  test:
    name: Quality checks (typecheck + lint + format + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Seed the LOCAL/test D1 (recipes + store products) so integration tests
      # run against a real catalogue. Local-only: no CF credentials, no remote
      # writes (remote seeding is a deploy-time command, kept out of CI to dodge
      # rate limits). The recsys benchmark keeps using its frozen fixture.
      - name: Migrate + seed local D1
        run: |
          pnpm db:migrate:local
          pnpm seed --local
      - run: pnpm quality
  deploy:
    name: Deploy to Cloudflare Workers
    needs: test
    # Auto-deploy on every push to main (i.e. every squash-merged PR).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Apply only new D1 migrations (wrangler tracks applied ones in the
      # d1_migrations table). Never a per-file execute loop (CF rate limits).
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply smart_cart_db --remote
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
