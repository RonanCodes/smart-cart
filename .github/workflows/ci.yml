name: CI
# PR gate. The repo is PUBLIC, so Actions minutes are free — there is no billing
# reason to skip remote CI here. This runs the SAME local pre-push gate
# (format + lint + typecheck + build + unit tests), plus the matcher eval and the
# Playwright e2e journey, on every PR into main.
#
# This is intentionally separate from deploy.yml (CD-only, deploys on push to
# main). Do not merge the two: CI gates PRs, CD ships merges.
on:
  pull_request:
    branches: [main]

# Re-pushes to the same PR cancel the in-flight run so we only ever pay for the
# latest commit on a branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # STABLE NAME: set "gate" as the required status check in branch protection.
  # It covers format + lint + typecheck + build + unit tests + matcher eval — the
  # reproducible, secret-optional core. e2e runs as its own non-blocking job below.
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      # Apply local D1 migrations first (same as the pre-push hook) so the build
      # and unit tests see the real schema. Idempotent and local-only.
      - name: Apply local D1 migrations
        run: pnpm db:migrate:local

      # The gate proper: format-check + lint + typecheck + build + unit tests.
      - name: Quality gate (format + lint + typecheck + build + test)
        run: pnpm quality

      # Matcher eval (ADR-0004). By contract the script exits 0 (self-skips) when
      # OPENAI_API_KEY is absent, so a fork PR with no secrets is never blocked;
      # it exits non-zero ONLY on a real regression. Add OPENAI_API_KEY (and
      # optionally BRAINTRUST_API_KEY / BRAINTRUST_API_URL) as repo secrets to
      # turn this into a real gate for trusted PRs.
      - name: Matcher eval
        run: pnpm eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_API_URL: ${{ secrets.BRAINTRUST_API_URL }}

  # Playwright e2e: the full journey (onboarding → week → cart → supervised
  # checkout) with the dev-only VITE_PLAYWRIGHT_E2E_CART_LINKS shortcut. The app
  # boots with zero keys (sign-in uses the demo skip-login, planning is set-maths,
  # AI falls back), so this needs no secrets. playwright.config spins up its own
  # vite dev server and waits on /api/health.
  #
  # NON-BLOCKING by default (continue-on-error) so flaky browser runs don't wedge
  # the merge queue. Do NOT mark this a required check until it has proven stable;
  # promote it to required (or fold it into the gate) once it is.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Apply local D1 migrations
        run: pnpm db:migrate:local

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
