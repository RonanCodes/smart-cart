<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Smart Cart">
  <!-- Smart Cart favicon: simplified shopping-cart glyph in brand leaf green -->
  <rect width="32" height="32" rx="7" fill="#FBFDF9"/>
  <g fill="none" stroke="#43A047" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- handle, basket body, and front/back walls in one path -->
    <path d="M5 8 H8 L9.4 11 H26 L23.2 19.6 H12.2 L9.4 11" />
  </g>
  <!-- wheels -->
  <circle cx="13.4" cy="23.6" r="2.2" fill="#43A047"/>
  <circle cx="21.6" cy="23.6" r="2.2" fill="#43A047"/>
  <!-- tomato accent in the basket -->
  <circle cx="17.6" cy="14.8" r="2.4" fill="#E8703A"/>
  <path d="M17.6 12.7 q1 -1.2 2 -0.5" fill="none" stroke="#43A047" stroke-width="1.3" stroke-linecap="round"/>
</svg>
